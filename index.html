<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Let’s play Mölkky!</title>

  <style>
    :root {
      --bg: #f4f1e8;
      --text: #263128;
      --green: #2f8f46;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top, #fff8df 0%, var(--bg) 52%, #e6eadf 100%);
      color: var(--text);
      text-align: center;
      position: relative;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-skittle {
      position: absolute;
      user-select: none;
      -webkit-user-drag: none;
      opacity: 0.18;
      transform-origin: center center;
      filter: saturate(1.02);
    }

    .damage-overlay {
      position: fixed;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 50%,
          rgba(255, 0, 90, 0.30) 0%,
          rgba(160, 0, 255, 0.22) 35%,
          rgba(90, 0, 110, 0.14) 55%,
          rgba(0, 0, 0, 0) 75%);
    }

    .damage-overlay.show {
      animation: damageFlash 0.42s ease;
    }

    @keyframes damageFlash {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      55%  { opacity: 0.82; }
      100% { opacity: 0; }
    }

    #appShell {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    #appShell.damage {
      animation: screenShake 0.42s ease;
    }

    @keyframes screenShake {
      0%   { transform: translate(0, 0); }
      10%  { transform: translate(-7px, 3px); }
      20%  { transform: translate(7px, -4px); }
      30%  { transform: translate(-8px, -2px); }
      40%  { transform: translate(8px, 3px); }
      50%  { transform: translate(-6px, -3px); }
      60%  { transform: translate(6px, 2px); }
      70%  { transform: translate(-4px, 2px); }
      80%  { transform: translate(4px, -2px); }
      100% { transform: translate(0, 0); }
    }

    .over-popup {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .over-popup.show {
      display: flex;
    }

    .over-popup-card {
      background: rgba(255, 255, 255, 0.96);
      border: 5px solid #e53935;
      border-radius: 28px;
      padding: 28px 34px;
      box-shadow: 0 14px 36px rgba(0,0,0,0.22);
      animation: overPop 2.1s ease forwards;
    }

    .over-popup-title {
      font-size: 42px;
      font-weight: 950;
      color: #e53935;
      line-height: 1.1;
    }

    .over-popup-text {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 900;
      color: #263128;
    }

    @keyframes overPop {
      0% {
        transform: scale(0.6) rotate(-5deg);
        opacity: 0;
      }
      15% {
        transform: scale(1.12) rotate(3deg);
        opacity: 1;
      }
      75% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: scale(0.95);
        opacity: 0;
      }
    }

    .screen {
      display: none;
      width: 100%;
      height: 100dvh;
      padding: 12px 18px;
      position: relative;
      overflow: hidden;
    }

    .active {
      display: block;
    }

    h1 {
      margin: 12px 0 6px;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      font-size: 15px;
      opacity: 0.75;
      margin: 0 0 8px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      padding: 16px;
      margin: 10px auto;
      max-width: 390px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      border: 3px solid rgba(255,255,255,0.85);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    select,
    input {
      font-size: 21px;
      padding: 12px;
      border-radius: 18px;
      border: 2px solid #b8c6b0;
      width: 82%;
      max-width: 280px;
      text-align: center;
      margin: 8px;
      background: #fff;
    }

    button,
    .icon-button {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font-size: 20px;
      padding: 13px 24px;
      border: none;
      border-radius: 20px;
      background: var(--green);
      color: white;
      font-weight: 800;
      margin: 8px;
      cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,0.16);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      position: relative;
      z-index: 1;
    }

    button:active,
    .icon-button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.16);
    }

    .fixed-score-header {
      position: relative;
      z-index: 12;
      background: rgba(244, 241, 232, 0.80);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px 8px 9px;
      margin: -12px -18px 8px;
      box-shadow: 0 5px 16px rgba(0,0,0,0.1);
    }

    .app-title-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      max-width: 390px;
      margin: 0 auto 7px;
      gap: 8px;
      font-size: 22px;
      font-weight: 950;
      line-height: 1;
      letter-spacing: -0.3px;
      text-align: left;
    }

    .app-title-logo {
      width: 34px;
      height: 34px;
      object-fit: contain;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .fixed-score-row {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 4px 6px 6px;
      max-width: 100%;
      scrollbar-width: none;
    }

    .fixed-score-row::-webkit-scrollbar {
      display: none;
    }

    .fixed-score-item {
      min-width: 78px;
      border-radius: 16px;
      padding: 6px 8px;
      font-weight: 900;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      border: 3px solid currentColor;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      flex-shrink: 0;
      background: rgba(255,255,255,0.9);
    }

    .fixed-score-name {
      font-size: 12px;
      line-height: 1.1;
    }

    .fixed-score-point {
      font-size: 23px;
      line-height: 1;
      margin-top: 3px;
    }

    .fixed-score-item.active-team {
      transform: scale(1.06);
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    }

    .top-actions {
      max-width: 390px;
      margin: 2px auto 5px;
      padding: 0 8px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .official-button {
      margin-right: auto;
    }

    .icon-button {
      width: 50px;
      height: 50px;
      padding: 0;
      border-radius: 50%;
      font-size: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.95);
      color: #263128;
      border: 2px solid #ccd5c5;
      box-shadow: 0 5px 0 rgba(0,0,0,0.16);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      text-decoration: none;
      overflow: hidden;
      cursor: pointer;
    }

    .official-button img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      display: block;
    }

    .team-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }

    .team-name {
      font-size: 28px;
      font-weight: 900;
      margin: 0;
      text-align: left;
      flex: 1;
      min-width: 0;
    }

    .target {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: #f1f4ed;
      font-weight: 800;
      font-size: 15px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .score {
      font-size: 58px;
      font-weight: 950;
      margin: 2px 0 4px;
      line-height: 1;
    }

    .score-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      row-gap: 16px;
      column-gap: 12px;
      width: 100%;
      max-width: 390px;
      margin: 18px auto 10px;
      padding: 0 8px;
      position: relative;
      z-index: 1;
    }

    .score-buttons button {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      margin: 0 auto;
      padding: 0;
      font-size: 24px;
      background: rgba(255,255,255,0.96);
      color: #263128;
      border: 4px solid currentColor;
      box-shadow: 0 6px 0 rgba(0,0,0,0.14);
    }

    .score-buttons .zero-button {
      grid-column: 2 / span 2;
      justify-self: center;
    }

    .status {
      display: none;
    }

    .team-card {
      transition: background 0.25s ease, transform 0.25s ease;
    }

    .team-card.bump {
      animation: bump 0.35s ease;
    }

    @keyframes bump {
      0% { transform: scale(1); }
      45% { transform: scale(1.035) rotate(-1deg); }
      100% { transform: scale(1); }
    }

    .winner-card {
      animation: winnerPop 0.7s ease both;
      border: 5px solid gold;
      background: linear-gradient(180deg, #fffbe4, rgba(255,255,255,0.95));
    }

    .winner {
      font-size: 38px;
      font-weight: 950;
      color: #c28a00;
      line-height: 1.25;
    }

    @keyframes winnerPop {
      0% { transform: scale(0.7); opacity: 0; }
      55% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); }
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 16px;
      z-index: 30;
      pointer-events: none;
      animation: fall linear forwards;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0.92;
      }
    }

    @media (max-width: 420px) {
      .screen {
        padding: 10px 14px;
      }

      .fixed-score-header {
        margin: -10px -14px 7px;
      }

      .app-title-row {
        font-size: 20px;
      }

      .app-title-logo {
        width: 32px;
        height: 32px;
      }

      .card {
        max-width: 350px;
        padding: 14px;
        margin: 9px auto;
      }

      .team-name {
        font-size: 26px;
      }

      .score {
        font-size: 54px;
      }

      .score-buttons {
        max-width: 350px;
        row-gap: 15px;
        column-gap: 10px;
        margin: 16px auto 8px;
        padding: 0;
      }

      .score-buttons button {
        width: 64px;
        height: 64px;
        font-size: 23px;
      }

      .fixed-score-item {
        min-width: 76px;
      }

      .fixed-score-point {
        font-size: 22px;
      }

      .icon-button {
        width: 48px;
        height: 48px;
      }

      .official-button img {
        width: 34px;
        height: 34px;
      }

      .over-popup-card {
        padding: 24px 28px;
      }

      .over-popup-title {
        font-size: 38px;
      }

      .over-popup-text {
        font-size: 22px;
      }
    }

    @media (max-height: 720px) {
      .fixed-score-header {
        padding: 6px 8px 7px;
      }

      .app-title-row {
        font-size: 18px;
        margin-bottom: 4px;
      }

      .app-title-logo {
        width: 28px;
        height: 28px;
      }

      .top-actions {
        margin: 0 auto 2px;
      }

      .icon-button {
        width: 44px;
        height: 44px;
        font-size: 22px;
      }

      .official-button img {
        width: 31px;
        height: 31px;
      }

      .card {
        padding: 12px;
        margin: 7px auto;
      }

      .team-name {
        font-size: 24px;
      }

      .score {
        font-size: 48px;
      }

      .score-buttons {
        row-gap: 12px;
        margin: 12px auto 6px;
      }

      .score-buttons button {
        width: 58px;
        height: 58px;
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <div id="bgPattern" class="bg-pattern" aria-hidden="true"></div>
  <div id="damageOverlay" class="damage-overlay"></div>

  <div id="overPopup" class="over-popup">
    <div class="over-popup-card">
      <div class="over-popup-title">オーバー！</div>
      <div class="over-popup-text">25点からスタート</div>
    </div>
  </div>

  <div id="appShell">
    <div id="setupScreen" class="screen active">
      <h1>Let’s play Mölkky!</h1>
      <p class="subtitle">モルック得点管理</p>

      <div class="card">
        <p>チーム数</p>
        <select id="teamCount">
          <option value="2">2チーム</option>
          <option value="3">3チーム</option>
          <option value="4">4チーム</option>
          <option value="5">5チーム</option>
        </select>

        <p>目標点</p>
        <input id="targetScore" type="number" value="50" min="1" />

        <br>
        <button onclick="startGame()">ゲーム開始</button>
      </div>
    </div>

    <div id="gameScreen" class="screen">
      <div class="fixed-score-header">
        <div class="app-title-row">
          <img class="app-title-logo" src="molkky14.png" alt="" />
          <span>Let’s play Mölkky! [SCORE]</span>
        </div>

        <div id="fixedScoreRow" class="fixed-score-row"></div>
      </div>

      <div class="top-actions">
        <a
          class="icon-button official-button"
          href="https://molkky.jp/molkky/"
          target="_blank"
          rel="noopener noreferrer"
          title="モルック公式HP"
          aria-label="モルック公式HP"
        >
          <img src="molkky13.png" alt="公式HP" />
        </a>

        <button class="icon-button" onclick="undoScore()" title="1手戻す" aria-label="1手戻す">↩️</button>
        <button class="icon-button" onclick="resetGame()" title="リセット" aria-label="リセット">🔄</button>
      </div>

      <div id="teamCard" class="card team-card">
        <div class="team-header-row">
          <div id="currentTeam" class="team-name">チームA</div>
          <div id="targetText" class="target">目標：50点</div>
        </div>
        <div id="currentScore" class="score">0</div>
      </div>

      <div class="score-buttons" id="scoreButtons"></div>

      <div id="status" class="status"></div>
    </div>

    <div id="winnerScreen" class="screen">
      <h1>Let’s play Mölkky!</h1>

      <div class="card winner-card">
        <div class="winner" id="winnerText"></div>
        <p>ぴったり達成！</p>
      </div>

      <button onclick="resetGame()">🔄 最初から</button>
    </div>
  </div>

  <script>
    let teams = [];
    let currentIndex = 0;
    let targetScore = 50;
    let gameOver = false;
    let history = [];

    const teamColors = [
      { name: "赤", main: "#e53935", light: "#ffe6e6" },
      { name: "青", main: "#1e88e5", light: "#e4f1ff" },
      { name: "黄色", main: "#fbc02d", light: "#fff7cc" },
      { name: "紫", main: "#8e24aa", light: "#f4e4fa" },
      { name: "オレンジ", main: "#fb8c00", light: "#fff0d9" }
    ];

    const bgImages = [
      "molkky1.png", "molkky2.png", "molkky3.png", "molkky4.png",
      "molkky5.png", "molkky6.png", "molkky7.png", "molkky8.png",
      "molkky9.png", "molkky10.png", "molkky11.png", "molkky12.png"
    ];

    function startGame() {
      const count = Number(document.getElementById("teamCount").value);
      targetScore = Number(document.getElementById("targetScore").value);

      teams = [];

      for (let i = 0; i < count; i++) {
        teams.push({
          name: `チーム${String.fromCharCode(65 + i)}`,
          score: 0,
          color: teamColors[i]
        });
      }

      currentIndex = 0;
      gameOver = false;
      history = [];

      createScoreButtons();
      showScreen("gameScreen");
      updateDisplay();
    }

    function createScoreButtons() {
      const area = document.getElementById("scoreButtons");
      area.innerHTML = "";

      for (let i = 1; i <= 12; i++) {
        const btn = document.createElement("button");
        btn.textContent = i;
        btn.onclick = () => addScore(i);
        area.appendChild(btn);
      }

      const zeroBtn = document.createElement("button");
      zeroBtn.textContent = 0;
      zeroBtn.className = "zero-button";
      zeroBtn.onclick = () => addScore(0);
      area.appendChild(zeroBtn);
    }

    function addScore(points) {
      if (gameOver) return;

      history.push({
        teams: JSON.parse(JSON.stringify(teams)),
        currentIndex: currentIndex,
        gameOver: gameOver
      });

      const team = teams[currentIndex];
      const newScore = team.score + points;

      if (newScore === targetScore) {
        team.score = newScore;
        gameOver = true;
        updateDisplay();

        document.getElementById("winnerText").innerHTML =
          `${team.name} の勝利🏅`;

        showScreen("winnerScreen");
        launchConfetti();
        return;
      }

      if (newScore > targetScore) {
        const restartScore = getRestartScore();

        team.score = restartScore;
        updateDisplay();
        playDamageEffect();

        setTimeout(() => {
          showOverPopup(restartScore);
        }, 430);

        setTimeout(() => {
          nextTeam();
        }, 2500);

        return;
      }

      team.score = newScore;
      nextTeam();
    }

    function nextTeam() {
      currentIndex = (currentIndex + 1) % teams.length;
      updateDisplay();
    }

    function undoScore() {
      if (history.length === 0) {
        return;
      }

      const last = history.pop();
      teams = last.teams;
      currentIndex = last.currentIndex;
      gameOver = last.gameOver;

      showScreen("gameScreen");
      updateDisplay();
    }

    function updateDisplay() {
      const team = teams[currentIndex];
      const teamCard = document.getElementById("teamCard");

      document.getElementById("currentTeam").textContent = team.name;
      document.getElementById("currentScore").textContent = team.score;
      document.getElementById("targetText").textContent =
        `目標：${targetScore}点`;

      teamCard.style.background = team.color.light;
      teamCard.style.borderColor = team.color.main;

      document.getElementById("currentTeam").style.color = team.color.main;
      document.getElementById("currentScore").style.color = team.color.main;

      teamCard.classList.remove("bump");
      void teamCard.offsetWidth;
      teamCard.classList.add("bump");

      const scoreButtons = document.querySelectorAll(".score-buttons button");
      scoreButtons.forEach(btn => {
        btn.style.color = team.color.main;
        btn.style.borderColor = team.color.main;
      });

      updateFixedScoreHeader();
    }

    function updateFixedScoreHeader() {
      const fixedScoreRow = document.getElementById("fixedScoreRow");
      fixedScoreRow.innerHTML = "";

      teams.forEach((t, index) => {
        const item = document.createElement("div");
        item.className = "fixed-score-item";

        if (index === currentIndex && !gameOver) {
          item.classList.add("active-team");
        }

        item.style.color = t.color.main;
        item.style.background = t.color.light;

        item.innerHTML = `
          <div class="fixed-score-name">${t.name}</div>
          <div class="fixed-score-point">${t.score}</div>
        `;

        fixedScoreRow.appendChild(item);
      });
    }

    function playDamageEffect() {
      const shell = document.getElementById("appShell");
      const overlay = document.getElementById("damageOverlay");

      shell.classList.remove("damage");
      overlay.classList.remove("show");

      void shell.offsetWidth;
      void overlay.offsetWidth;

      shell.classList.add("damage");
      overlay.classList.add("show");

      setTimeout(() => {
        shell.classList.remove("damage");
        overlay.classList.remove("show");
      }, 450);
    }

    function showOverPopup(restartScore) {
      const popup = document.getElementById("overPopup");
      const text = document.querySelector(".over-popup-text");

      text.textContent = `${restartScore}点からスタート`;

      popup.classList.remove("show");
      void popup.offsetWidth;
      popup.classList.add("show");

      setTimeout(() => {
        popup.classList.remove("show");
      }, 2100);
    }

    function getRestartScore() {
      if (targetScore <= 49) {
        return Math.floor(targetScore / 2);
      }

      return 25;
    }

    function launchConfetti() {
      const colors = ["#e53935", "#1e88e5", "#fbc02d", "#8e24aa", "#fb8c00", "#43a047"];

      for (let i = 0; i < 100; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = 2.2 + Math.random() * 2.2 + "s";
        piece.style.animationDelay = Math.random() * 0.6 + "s";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);

        setTimeout(() => {
          piece.remove();
        }, 5000);
      }
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.remove("active");
      });

      document.getElementById(id).classList.add("active");
    }

    function resetGame() {
      showScreen("setupScreen");
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function intersects(a, b, padding = 12) {
      return !(
        a.x + a.w + padding < b.x ||
        a.x > b.x + b.w + padding ||
        a.y + a.h + padding < b.y ||
        a.y > b.y + b.h + padding
      );
    }

    function createBackgroundPattern() {
      const container = document.getElementById("bgPattern");
      if (!container) return;

      container.innerHTML = "";

      const vw = window.innerWidth;
      const vh = window.innerHeight;

      const imagePool = shuffle(bgImages);

      const isMobile = vw < 768;
      const itemCount = isMobile ? 8 : 12;
      const chosen = imagePool.slice(0, itemCount);

      const zonesMobile = [
        { x: 0.02, y: 0.03, w: 0.18, h: 0.14 },
        { x: 0.78, y: 0.03, w: 0.18, h: 0.14 },
        { x: 0.03, y: 0.19, w: 0.16, h: 0.14 },
        { x: 0.81, y: 0.20, w: 0.14, h: 0.14 },
        { x: 0.03, y: 0.45, w: 0.16, h: 0.14 },
        { x: 0.81, y: 0.44, w: 0.14, h: 0.14 },
        { x: 0.06, y: 0.77, w: 0.16, h: 0.14 },
        { x: 0.77, y: 0.77, w: 0.16, h: 0.14 }
      ];

      const zonesDesktop = [
        { x: 0.02, y: 0.03, w: 0.14, h: 0.14 },
        { x: 0.18, y: 0.03, w: 0.12, h: 0.13 },
        { x: 0.76, y: 0.03, w: 0.12, h: 0.13 },
        { x: 0.86, y: 0.04, w: 0.12, h: 0.14 },
        { x: 0.03, y: 0.22, w: 0.12, h: 0.13 },
        { x: 0.86, y: 0.22, w: 0.11, h: 0.13 },
        { x: 0.03, y: 0.42, w: 0.13, h: 0.13 },
        { x: 0.86, y: 0.42, w: 0.11, h: 0.13 },
        { x: 0.03, y: 0.62, w: 0.13, h: 0.13 },
        { x: 0.86, y: 0.62, w: 0.11, h: 0.13 },
        { x: 0.10, y: 0.80, w: 0.13, h: 0.13 },
        { x: 0.78, y: 0.80, w: 0.13, h: 0.13 }
      ];

      const zones = isMobile ? zonesMobile : zonesDesktop;
      const placedBoxes = [];

      chosen.forEach((src, index) => {
        const zone = zones[index % zones.length];

        let size = isMobile
          ? randomInt(82, 116)
          : randomInt(105, 160);

        let x = Math.round((zone.x * vw) + Math.random() * Math.max(10, (zone.w * vw - size)));
        let y = Math.round((zone.y * vh) + Math.random() * Math.max(10, (zone.h * vh - size)));

        let box = { x, y, w: size, h: size };
        let attempts = 0;

        while (placedBoxes.some(prev => intersects(box, prev, isMobile ? 10 : 14)) && attempts < 30) {
          size = isMobile
            ? randomInt(82, 116)
            : randomInt(105, 160);

          x = Math.round((zone.x * vw) + Math.random() * Math.max(10, (zone.w * vw - size)));
          y = Math.round((zone.y * vh) + Math.random() * Math.max(10, (zone.h * vh - size)));

          box = { x, y, w: size, h: size };
          attempts++;
        }

        placedBoxes.push(box);

        const img = document.createElement("img");
        img.src = src;
        img.alt = "";
        img.className = "bg-skittle";
        img.style.width = size + "px";
        img.style.left = x + "px";
        img.style.top = y + "px";
        img.style.opacity = (Math.random() * 0.05 + 0.15).toFixed(2);
        img.style.transform = `rotate(${randomInt(-28, 28)}deg)`;
        container.appendChild(img);
      });
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    window.addEventListener("load", () => {
      createBackgroundPattern();
    });
  </script>
</body>
</html>
